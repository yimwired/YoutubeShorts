name: Daily Video Generation

on:
  # Primary runner since 2026-06-10 (full-cloud migration). The TikTok
  # blocker that forced a local runner is gone: cookie-based upload broke
  # with TikTok's 2026-05 UI change and is disabled in generate_batch.py
  # anyway, so the cloud runner uploads exactly what the local one did
  # (YouTube only). Local FactSnapBatch task is disabled.
  schedule:
    - cron: '0 23 * * *'   # 06:00 Bangkok (UTC+7)
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-base

      - name: Write YouTube credential files
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
        run: |
          printf '%s' "$YOUTUBE_TOKEN" > token_youtube.json
          printf '%s' "$YOUTUBE_CLIENT_SECRETS" > client_secrets.json

      - name: Generate & upload videos
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_VIDEO_LOG_DB_ID: ${{ secrets.NOTION_VIDEO_LOG_DB_ID }}
        run: python generate_batch.py 3

      # Queue jobs + B thumbnails must land in the repo: the swap workflow
      # (swap.yml, 02:00 Bangkok) runs on a fresh runner days later and reads
      # them from the checkout. Same for topic/rate/bucket state — without
      # committing these, every cloud run would start from a blank slate and
      # repeat topics/slots.
      - name: Commit state (queue, thumbs, topic/rate/bucket)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A queue/ output/
          git add topic_history.json rate_usage.json
          if [ -f bucket_state.json ]; then git add bucket_state.json; fi
          git diff --staged --quiet || git commit -m "chore: update pipeline state [skip ci]"
          git pull --rebase origin main
          git push
