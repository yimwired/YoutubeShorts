name: Daily Video Generation

on:
  schedule:
    - cron: '0 23 * * *'   # 06:00 Bangkok (UTC+7) — 2-hour buffer before 08:00 first slot
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-tiny

      - name: Write secrets to files
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_VIDEO_LOG_DB_ID: ${{ secrets.NOTION_VIDEO_LOG_DB_ID }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
        run: |
          printf 'GROQ_API_KEY=%s\n' "$GROQ_API_KEY" > .env
          printf 'PEXELS_API_KEY=%s\n' "$PEXELS_API_KEY" >> .env
          printf 'PIXABAY_API_KEY=%s\n' "$PIXABAY_API_KEY" >> .env
          printf 'YOUTUBE_CLIENT_ID=%s\n' "$YOUTUBE_CLIENT_ID" >> .env
          printf 'YOUTUBE_CLIENT_SECRET=%s\n' "$YOUTUBE_CLIENT_SECRET" >> .env
          printf 'TIKTOK_CLIENT_KEY=%s\n' "$TIKTOK_CLIENT_KEY" >> .env
          printf 'TIKTOK_CLIENT_SECRET=%s\n' "$TIKTOK_CLIENT_SECRET" >> .env
          printf 'NOTION_TOKEN=%s\n' "$NOTION_TOKEN" >> .env
          printf 'NOTION_VIDEO_LOG_DB_ID=%s\n' "$NOTION_VIDEO_LOG_DB_ID" >> .env
          printf '%s' "$YOUTUBE_TOKEN" > token_youtube.json
          printf '%s' "$YOUTUBE_CLIENT_SECRETS" > client_secrets.json

      - name: Generate & upload videos
        run: python generate_batch.py 3

      - name: Commit updated topic history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topic_history.json
          git diff --staged --quiet || git commit -m "chore: update topic history [skip ci]"
          git push
