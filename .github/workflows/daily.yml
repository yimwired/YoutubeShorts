name: Daily Video Generation

on:
  schedule:
    - cron: '0 23 * * *'   # 06:00 Bangkok (UTC+7) — 2-hour buffer before 08:00 first slot
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-tiny

      - name: Write secrets to files
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
        run: |
          printf '%s' "$ENV_FILE" > .env
          printf '%s' "$YOUTUBE_TOKEN" > token_youtube.json
          printf '%s' "$YOUTUBE_CLIENT_SECRETS" > client_secrets.json

      - name: Generate & upload videos
        run: python generate_batch.py 3

      - name: Commit updated topic history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add topic_history.json
          git diff --staged --quiet || git commit -m "chore: update topic history [skip ci]"
          git push
