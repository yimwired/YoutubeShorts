name: Auto-Reply Comments

# Replies to the top unanswered comment on recent uploads (Bigger #9).
# Runs nightly after the evening slot publishes. comment_reply_state.json
# tracks replied comment ids and is committed back so reruns never reply
# to the same comment twice.

on:
  schedule:
    - cron: '0 14 * * *'   # 21:00 Bangkok (UTC+7)
  workflow_dispatch:
    inputs:
      live:
        description: 'Post replies for real ("1") or dry-run ("0")'
        default: '0'

jobs:
  reply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # Only the API + LLM stack -- skip the heavy video deps in requirements.txt.
      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-auth-oauthlib google-auth-httplib2 requests python-dotenv google-genai

      # sed strips a UTF-8 BOM in case the secret was ever set via a
      # PowerShell pipe (which prepends one) -- json.load rejects BOMs.
      - name: Write YouTube credential file
        env:
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
        run: printf '%s' "$YOUTUBE_TOKEN" | sed '1s/^\xef\xbb\xbf//' > token_youtube.json

      - name: Reply to top comments
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          VERBOSE: '1'
          # Scheduled runs always post; manual dispatch defaults to dry-run.
          COMMENT_REPLY_ENABLED: ${{ github.event_name == 'schedule' && '1' || inputs.live }}
        run: python reply_comments.py --live --days 14 --min-likes 0

      - name: Commit reply state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rate_usage.json
          # state file only exists after the first live posting
          if [ -f comment_reply_state.json ]; then git add comment_reply_state.json; fi
          git diff --staged --quiet || git commit -m "chore: comment reply state [skip ci]"
          git pull --rebase origin main
          git push
